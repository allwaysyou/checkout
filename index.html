<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Delivery</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        /* Scrollbar hide karne ke liye */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center antialiased">

    <div class="w-full max-w-md bg-white min-h-screen relative shadow-2xl sm:my-8 sm:rounded-[2rem] sm:min-h-0 sm:h-[850px] flex flex-col overflow-hidden border-gray-200 sm:border-8">
        
        <div class="bg-gradient-to-r from-gray-900 to-gray-800 text-white px-6 py-8 rounded-b-3xl shadow-lg relative z-10">
            <div class="flex justify-between items-center mb-4">
                <button class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm">
                    <i class="fas fa-bell"></i>
                </div>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Checkout</h1>
            <p class="text-gray-300 text-sm mt-1">Apni delivery details confirm karein</p>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar px-6 py-6 pb-32">
            <form id="deliveryForm" class="space-y-6">
                
                <div class="bg-gray-50 rounded-2xl p-5 shadow-sm border border-gray-100">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Contact Info</h2>
                    <div class="space-y-4">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-user text-gray-400"></i>
                            </div>
                            <input type="text" name="Naam" required class="block w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all outline-none" placeholder="Name">
                        </div>

                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-phone text-gray-400"></i>
                            </div>
                            <input type="tel" name="Phone" required class="block w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all outline-none" placeholder="Mobile Number">
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 rounded-2xl p-5 shadow-sm border border-gray-100">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Delivery Address</h2>
                    <div class="space-y-4">
                        
                        <div class="relative">
                            <div class="absolute top-3.5 left-0 pl-4 pointer-events-none">
                                <i class="fas fa-map-marker-alt text-gray-400"></i>
                            </div>
                            <textarea name="Address" rows="2" required class="block w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all outline-none resize-none" placeholder="Flat No, Building, Street Name"></textarea>
                        </div>

                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-location-crosshairs text-gray-400"></i>
                            </div>
                            <input type="text" name="Landmark" class="block w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all outline-none" placeholder="Near me / Landmark (e.g. Mandir ke paas)">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-city text-gray-400 text-xs"></i>
                                </div>
                                <input type="text" name="City" required class="block w-full pl-9 pr-3 py-3 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-gray-900 transition-all outline-none" placeholder="City">
                            </div>

                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-map text-gray-400 text-xs"></i>
                                </div>
                                <select id="stateSelect" name="State" required class="block w-full pl-9 pr-8 py-3 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-gray-900 appearance-none outline-none">
                                    <option value="" disabled selected>State</option>
                                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                                    <option value="Bihar">Bihar</option>
                                    <option value="Delhi">Delhi</option>
                                    <option value="Gujarat">Gujarat</option>
                                    <option value="Haryana">Haryana</option>
                                    <option value="Karnataka">Karnataka</option>
                                    <option value="Maharashtra">Maharashtra</option>
                                    <option value="Punjab">Punjab</option>
                                    <option value="Rajasthan">Rajasthan</option>
                                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                                    <option value="West Bengal">West Bengal</option>
                                    <option value="Other">Other (Type manually)</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                    <i class="fas fa-chevron-down text-gray-400 text-xs"></i>
                                </div>
                            </div>
                        </div>

                        <div id="otherStateDiv" class="relative hidden transition-all duration-300">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-pen text-gray-400 text-xs"></i>
                            </div>
                            <input type="text" id="otherStateInput" class="block w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-gray-900 focus:border-transparent transition-all outline-none" placeholder="Apne State ka naam likhein">
                        </div>

                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-thumbtack text-gray-400 text-xs"></i>
                            </div>
                            <input type="number" name="Pincode" required class="block w-full pl-9 pr-3 py-3 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-gray-900 transition-all outline-none" placeholder="Pincode">
                        </div>
                    </div>
                </div>

                <div class="bg-gray-50 rounded-2xl p-5 shadow-sm border border-gray-100">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Package Type</h2>
                    <div class="relative">
                        <select name="ItemType" class="block w-full pl-4 pr-10 py-3 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm focus:ring-2 focus:ring-gray-900 appearance-none outline-none">
                            <option value="Standard">Standard Package</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Fragile">Fragile (Sheeshe ka saaman)</option>
                            <option value="Food">Food Delivery</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <i class="fas fa-chevron-down text-gray-400 text-sm"></i>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-white px-6 py-4 border-t border-gray-100 rounded-b-[2rem]">
            <button id="submitBtn" class="w-full bg-gray-900 hover:bg-black text-white font-semibold py-4 rounded-2xl shadow-xl shadow-gray-900/30 transition-transform active:scale-95 flex justify-center items-center gap-2">
                <span>Confirm Order</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>

    </div>

<script>
    // FIX: URL ke beech mein jo enter tha wo hata diya gaya hai.
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxtl5d_mpl0b1vaRF5yJYHYA1NcxzF_0GC0CQSrsiXjjufLi6IT1tEeO9XWtgdezuWWaA/exec';
    
    const form = document.getElementById('deliveryForm');
    const submitBtn = document.getElementById('submitBtn');
    
    const stateSelect = document.getElementById('stateSelect');
    const otherStateDiv = document.getElementById('otherStateDiv');
    const otherStateInput = document.getElementById('otherStateInput');

    stateSelect.addEventListener('change', function() {
        if (this.value === 'Other') {
            otherStateDiv.classList.remove('hidden');
            otherStateInput.setAttribute('required', 'true');
            otherStateInput.setAttribute('name', 'State'); 
            stateSelect.removeAttribute('name'); 
        } else {
            otherStateDiv.classList.add('hidden');
            otherStateInput.removeAttribute('required');
            otherStateInput.removeAttribute('name');
            stateSelect.setAttribute('name', 'State'); 
        }
    });

    submitBtn.addEventListener('click', e => {
        e.preventDefault(); 
        
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const originalBtnText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        submitBtn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Order Confirmed!';
                submitBtn.classList.replace('bg-gray-900', 'bg-green-600'); 
                form.reset(); 
                
                otherStateDiv.classList.add('hidden');
                otherStateInput.removeAttribute('required');
                otherStateInput.removeAttribute('name');
                stateSelect.setAttribute('name', 'State'); 

                setTimeout(() => {
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.classList.replace('bg-green-600', 'bg-gray-900');
                    submitBtn.disabled = false;
                }, 3000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                submitBtn.innerHTML = '<i class="fas fa-times-circle"></i> Error Occurred';
                submitBtn.classList.replace('bg-gray-900', 'bg-red-600');

                setTimeout(() => {
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.classList.replace('bg-red-600', 'bg-gray-900');
                    submitBtn.disabled = false;
                }, 3000);
            });
    });
</script>

</body>
</html>
